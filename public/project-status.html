<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>Project Status — Sparks Hospitality</title>
    <link rel="stylesheet" href="/css/hifi-fonts.css">
    <link rel="stylesheet" href="/css/hifi-tokens.css">
    <link rel="stylesheet" href="/css/hifi-base.css">
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: var(--hf-bg); }
      #app { min-height: 100vh; }
      #gate { min-height: 100vh; display: grid; place-items: center; font-family: var(--hf-font-body); color: var(--hf-muted); }
      #gate .hf-eyebrow { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; }
      #gate .alert { max-width: 480px; margin: 24px; background: var(--hf-paper); border: 1px solid var(--hf-line-2); padding: 20px 22px; border-radius: 6px; color: var(--hf-ink); }
      #gate h5 { font-family: var(--hf-font-display); margin: 0 0 8px; font-size: 18px; }
    </style>
</head>
<body class="hf-body">
  <div id="gate"><div class="hf-eyebrow">Verifying access…</div></div>

  <script type="module">
    import { auth, onAuthStateChanged } from '/js/config/firebase-config.js'
    import { AdminClaims } from '/js/auth/admin-claims.js'

    document.addEventListener('DOMContentLoaded', () => {
      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          window.location.href = '/admin-login.html'
          return
        }
        try {
          const isAdmin = await AdminClaims.verifyAdminStatus(user)
          if (!isAdmin) {
            document.getElementById('gate').innerHTML = `
              <div class="alert"><h5>Admins only</h5><p style="margin:0;">Project Status is an internal admin surface.</p></div>`
            return
          }
          const host = document.getElementById('gate')
          host.outerHTML = '<div id="app"></div>'
          await import('/js/modules/project-status/v2/main.js')
        } catch (err) {
          document.getElementById('gate').innerHTML = `
            <div class="alert"><h5>Initialisation error</h5><p style="margin:0;">${(err && err.message) || 'Unknown error'}</p></div>`
        }
      })
    })
  </script>
</body>
</html>
