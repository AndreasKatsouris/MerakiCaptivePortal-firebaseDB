<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Corporate Compliance — Sparks Hospitality</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"
          integrity="sha384-gn5yKJkEGhTEnG9+YVzLrI1HwAOMSLuUlL7fBRm6J6VdNaVuQGpTcT72yiEiqzM" crossorigin="anonymous">
    <link href="css/corporate-compliance.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.14.5/dist/sweetalert2.all.min.js" crossorigin="anonymous"></script>
</head>
<body>

<!-- Module Header -->
<div class="dashboard-header">
    <div class="container">
        <a href="/admin-dashboard.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
        <h1><i class="fas fa-building me-3"></i>Corporate Compliance</h1>
        <p>Entity registry, compliance obligations, and deadline tracker</p>
    </div>
</div>

<!-- Main Content Area -->
<div class="main-container">
    <div id="compliance-summary-badges-wrapper" class="container pt-3">
        <div id="compliance-summary-badges"></div>
    </div>

    <!-- Module Mount Point -->
    <div class="container-fluid px-4 py-4">
        <div id="compliance-app">
            <div class="text-center py-5">
                <div class="spinner-border text-success" role="status"></div>
                <p class="mt-3 text-muted">Loading compliance data...</p>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVzdl1" crossorigin="anonymous"></script>

<script type="module">
    import { initializeComplianceModule } from './js/modules/compliance/index.js?v=1.0.0';
    import { auth, onAuthStateChanged } from './js/config/firebase-config.js';
    import { featureAccessControl } from './js/modules/access-control/services/feature-access-control.js';

    document.addEventListener('DOMContentLoaded', async () => {
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = '/user-login.html?message=unauthorized';
                return;
            }

            try {
                const idTokenResult = await user.getIdTokenResult();

                // Admins always get full access
                if (!idTokenResult.claims.admin) {
                    // Check subscription tier for non-admin users
                    const access = await featureAccessControl.checkFeatureAccess('corporateCompliance');
                    if (!access.hasAccess) {
                        document.getElementById('compliance-app').innerHTML =
                            '<div class="alert alert-warning mt-4">' +
                            '<i class="fas fa-lock me-2"></i>' +
                            '<strong>Professional or Enterprise subscription required.</strong> ' +
                            'Upgrade your plan to access the Corporate Compliance Tracker.' +
                            '</div>';
                        return;
                    }
                }

                await initializeComplianceModule('compliance-app');
            } catch (error) {
                const el = document.getElementById('compliance-app');
                const alertDiv = document.createElement('div');
                alertDiv.className = 'alert alert-danger mt-4';
                const h5 = document.createElement('h5');
                h5.textContent = 'Initialisation Error';
                const p = document.createElement('p');
                p.textContent = error.message;
                alertDiv.appendChild(h5);
                alertDiv.appendChild(p);
                el.innerHTML = '';
                el.appendChild(alertDiv);
            }
        });
    });
</script>

</body>
</html>
