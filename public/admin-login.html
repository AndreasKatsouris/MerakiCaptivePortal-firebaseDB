<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal — Sparks Hospitality</title>
    <link rel="stylesheet" href="/css/hifi-fonts.css">
    <link rel="stylesheet" href="/css/hifi-tokens.css">
    <link rel="stylesheet" href="/css/hifi-base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html, body { margin: 0; padding: 0; min-height: 100vh; }

        body {
            display: grid;
            grid-template-columns: 1fr;
            align-items: center;
            justify-items: center;
            padding: var(--hf-space-6) var(--hf-space-4);
            background: var(--hf-bg);
            background-image:
                radial-gradient(circle at 90% 10%, rgba(200, 154, 58, 0.08), transparent 480px),
                radial-gradient(circle at 10% 90%, rgba(176, 85, 58, 0.05), transparent 420px);
        }

        .auth-shell {
            width: 100%;
            max-width: 440px;
            position: relative;
        }

        .auth-eyebrow {
            text-align: center;
            margin-bottom: var(--hf-space-3);
        }

        .auth-card {
            background: var(--hf-paper);
            border: 1px solid var(--hf-line-2);
            border-radius: var(--hf-radius-md);
            padding: var(--hf-space-7) var(--hf-space-6) var(--hf-space-6);
            box-shadow: var(--hf-shadow-2);
            position: relative;
        }

        .auth-header {
            text-align: center;
            margin-bottom: var(--hf-space-6);
        }

        .auth-logo {
            height: 52px;
            margin: 0 auto var(--hf-space-4);
            display: block;
        }

        .auth-title {
            font-family: var(--hf-font-display);
            font-size: 34px;
            line-height: 1.1;
            letter-spacing: -0.01em;
            color: var(--hf-ink);
            margin: 0 0 var(--hf-space-2);
            font-weight: 400;
        }

        .auth-subtitle {
            font-size: 13px;
            color: var(--hf-muted);
            margin: 0;
        }

        .field {
            margin-bottom: var(--hf-space-4);
        }

        .field-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--hf-font-mono);
            font-size: 11px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--hf-muted);
            margin-bottom: var(--hf-space-2);
        }

        .field-input-wrap {
            position: relative;
        }

        .field-input {
            width: 100%;
            padding: 12px 40px 12px 14px;
            background: var(--hf-bg);
            border: 1px solid var(--hf-line-2);
            border-radius: var(--hf-radius);
            font-family: var(--hf-font-body);
            font-size: 14px;
            color: var(--hf-ink);
            transition: border-color var(--hf-transition), background var(--hf-transition), box-shadow var(--hf-transition);
        }

        .field-input::placeholder { color: var(--hf-muted); opacity: 0.6; }

        .field-input:hover { border-color: var(--hf-ink-2); }

        .field-input:focus {
            outline: none;
            border-color: var(--hf-accent);
            background: var(--hf-paper);
            box-shadow: 0 0 0 3px rgba(200, 154, 58, 0.15);
        }

        .field-input.is-invalid {
            border-color: var(--hf-warn);
            box-shadow: 0 0 0 3px rgba(176, 85, 58, 0.12);
        }

        .field-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--hf-muted);
            pointer-events: none;
            font-size: 13px;
        }

        .field-input:focus ~ .field-icon { color: var(--hf-accent); }

        .pw-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--hf-muted);
            padding: 6px 8px;
            cursor: pointer;
            border-radius: var(--hf-radius-sm);
            transition: color var(--hf-transition), background var(--hf-transition);
        }

        .pw-toggle:hover { color: var(--hf-accent); background: var(--hf-bg2); }

        .field-error {
            display: none;
            margin-top: 6px;
            font-size: 12px;
            color: var(--hf-warn);
            font-family: var(--hf-font-mono);
        }

        .remember-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: var(--hf-space-4) 0 var(--hf-space-5);
        }

        .remember-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--hf-accent);
            cursor: pointer;
        }

        .remember-row label {
            font-size: 13px;
            color: var(--hf-ink-2);
            cursor: pointer;
            user-select: none;
        }

        .alert {
            display: none;
            padding: 12px 14px;
            border-radius: var(--hf-radius);
            background: rgba(176, 85, 58, 0.08);
            border: 1px solid rgba(176, 85, 58, 0.3);
            color: var(--hf-crit);
            font-size: 13px;
            margin-bottom: var(--hf-space-4);
        }

        .alert.shake { animation: hf-shake 0.45s var(--hf-ease); }

        @keyframes hf-shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-4px); }
            40%, 80% { transform: translateX(4px); }
        }

        .btn-primary {
            width: 100%;
            padding: 13px 20px;
            background: var(--hf-ink);
            color: var(--hf-bg);
            border: 1px solid var(--hf-ink);
            border-radius: var(--hf-radius);
            font-family: var(--hf-font-body);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background var(--hf-transition), transform var(--hf-transition), box-shadow var(--hf-transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--hf-ink-2);
            box-shadow: var(--hf-shadow-2);
        }

        .btn-primary:active:not(:disabled) { transform: translateY(1px); }

        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .spinner-border {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(247, 244, 236, 0.3);
            border-top-color: var(--hf-bg);
            border-radius: 50%;
            animation: hf-spin 0.8s linear infinite;
        }

        @keyframes hf-spin { to { transform: rotate(360deg); } }

        .divider {
            display: flex;
            align-items: center;
            gap: var(--hf-space-3);
            margin: var(--hf-space-5) 0 var(--hf-space-4);
            font-family: var(--hf-font-mono);
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--hf-muted);
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-top: 1px solid var(--hf-line);
        }

        .quick-links {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--hf-space-2);
        }

        .quick-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 14px;
            background: var(--hf-bg);
            border: 1px solid var(--hf-line-2);
            border-radius: var(--hf-radius);
            color: var(--hf-ink-2);
            text-decoration: none;
            font-size: 12px;
            font-family: var(--hf-font-mono);
            letter-spacing: 0.04em;
            transition: all var(--hf-transition);
        }

        .quick-link:hover {
            background: var(--hf-ink);
            color: var(--hf-bg);
            border-color: var(--hf-ink);
        }

        .quick-link i { font-size: 11px; }

        .footnote {
            text-align: center;
            margin-top: var(--hf-space-5);
            font-family: var(--hf-font-mono);
            font-size: 10px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--hf-muted);
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(251, 249, 243, 0.88);
            display: grid;
            place-items: center;
            border-radius: var(--hf-radius-md);
            opacity: 0;
            visibility: hidden;
            transition: opacity var(--hf-transition), visibility var(--hf-transition);
            z-index: 10;
        }

        .loading-overlay.active { opacity: 1; visibility: visible; }

        .loading-spinner {
            width: 36px;
            height: 36px;
            border: 2px solid var(--hf-line-2);
            border-top-color: var(--hf-accent);
            border-radius: 50%;
            animation: hf-spin 0.9s linear infinite;
        }

        .tooltip-icon {
            color: var(--hf-muted);
            opacity: 0.5;
            font-size: 10px;
            cursor: help;
        }

        *:focus-visible {
            outline: 2px solid var(--hf-accent);
            outline-offset: 2px;
        }

        @media (max-width: 540px) {
            .auth-card { padding: var(--hf-space-6) var(--hf-space-5) var(--hf-space-5); }
            .auth-title { font-size: 28px; }
            .quick-links { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="hf-body">
    <div class="auth-shell">
        <div class="auth-eyebrow">
            <span class="hf-eyebrow">Sparks Hospitality · Admin</span>
        </div>

        <div class="auth-card">
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
            </div>

            <div class="auth-header">
                <img class="auth-logo" src="img/laki-sparks-logo.png" alt="Sparks Hospitality" onerror="this.style.display='none'">
                <h1 class="auth-title">Admin Portal</h1>
                <p class="auth-subtitle">Sign in to access the operations dashboard</p>
            </div>

            <form id="loginForm" novalidate>
                <div class="field">
                    <label for="email" class="field-label">
                        Email Address
                        <i class="fas fa-info-circle tooltip-icon" title="Use your administrator email"></i>
                    </label>
                    <div class="field-input-wrap">
                        <input type="email"
                            class="field-input"
                            id="email"
                            placeholder="admin@sparkshospitality.com"
                            autocomplete="username"
                            aria-label="Email address"
                            aria-describedby="email-error"
                            required>
                        <i class="fas fa-envelope field-icon"></i>
                    </div>
                    <span id="email-error" class="field-error"></span>
                </div>

                <div class="field">
                    <label for="password" class="field-label">
                        Password
                        <i class="fas fa-info-circle tooltip-icon" title="Enter your secure password"></i>
                    </label>
                    <div class="field-input-wrap">
                        <input type="password"
                            class="field-input"
                            id="password"
                            placeholder="••••••••"
                            autocomplete="current-password"
                            aria-label="Password"
                            aria-describedby="password-error"
                            required>
                        <button type="button"
                            class="pw-toggle"
                            id="passwordToggle"
                            aria-label="Toggle password visibility"
                            tabindex="-1">
                            <i class="fas fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                    <span id="password-error" class="field-error"></span>
                </div>

                <div class="remember-row">
                    <input type="checkbox" id="rememberMe" aria-label="Remember me">
                    <label for="rememberMe">Remember me for 30 days</label>
                </div>

                <div id="error-message" class="alert" role="alert"></div>

                <button type="submit" class="btn-primary" id="submitBtn">
                    <span id="loading-indicator" class="spinner-border" style="display: none;"></span>
                    <span id="btnText">Sign In</span>
                </button>
            </form>

            <div class="divider">Admin Access Only</div>

            <div class="quick-links">
                <a href="#" class="quick-link" id="forgotPassword">
                    <i class="fas fa-key"></i>
                    <span>Forgot Password</span>
                </a>
            </div>

            <p class="footnote">Sparks Hospitality · Restaurant OS</p>
        </div>
    </div>

    <script type="module" src="js/config/firebase-config.js"></script>
    <script type="module" src="js/admin/login.js"></script>

    <script>
        const passwordToggle = document.getElementById('passwordToggle');
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggleIcon');

        passwordToggle.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            toggleIcon.classList.toggle('fa-eye');
            toggleIcon.classList.toggle('fa-eye-slash');
        });

        const emailInput = document.getElementById('email');
        const form = document.getElementById('loginForm');
        const emailErrorEl = document.getElementById('email-error');

        emailInput.addEventListener('blur', function() {
            if (this.value && !this.validity.valid) {
                emailErrorEl.textContent = 'Please enter a valid email address';
                emailErrorEl.style.display = 'block';
                this.classList.add('is-invalid');
            } else {
                emailErrorEl.style.display = 'none';
                this.classList.remove('is-invalid');
            }
        });

        document.getElementById('forgotPassword').addEventListener('click', function(e) {
            e.preventDefault();
            const email = emailInput.value;
            if (email) {
                window.location.href = '/forgot-password.html?email=' + encodeURIComponent(email);
            } else {
                window.location.href = '/forgot-password.html';
            }
        });

        form.addEventListener('submit', function() {
            const submitBtn = document.getElementById('submitBtn');
            const loadingOverlay = document.getElementById('loadingOverlay');
            submitBtn.disabled = true;
            loadingOverlay.classList.add('active');
            document.getElementById('loading-indicator').style.display = 'inline-block';
            document.getElementById('btnText').textContent = 'Signing in…';
        });

        const errorMessage = document.getElementById('error-message');
        const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.attributeName === 'style' && errorMessage.style.display !== 'none' && errorMessage.style.display !== '') {
                    errorMessage.classList.add('shake');
                    setTimeout(() => errorMessage.classList.remove('shake'), 500);
                }
            });
        });
        observer.observe(errorMessage, { attributes: true });
    </script>
</body>
</html>
