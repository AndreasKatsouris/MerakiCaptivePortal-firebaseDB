<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>ROSS v2 (preview) — Sparks Hospitality</title>
    <link rel="stylesheet" href="/css/hifi-fonts.css">
    <link rel="stylesheet" href="/css/hifi-tokens.css">
    <link rel="stylesheet" href="/css/hifi-base.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.14.5/dist/sweetalert2.all.min.js" crossorigin="anonymous"></script>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: var(--hf-bg); }
      #app { min-height: 100vh; }
      /* Auth gate fallback styling — shown only until Vue app replaces it */
      #gate { min-height: 100vh; display: grid; place-items: center; font-family: var(--hf-font-body); color: var(--hf-muted); }
      #gate .hf-eyebrow { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; }
      #gate .alert { max-width: 480px; margin: 24px; background: var(--hf-paper); border: 1px solid var(--hf-line-2); padding: 20px 22px; border-radius: 6px; color: var(--hf-ink); }
      #gate h5 { font-family: var(--hf-font-display); margin: 0 0 8px; font-size: 18px; }
      #gate .alert--warn { border-color: rgba(176, 85, 58, 0.4); }
    </style>
</head>
<body class="hf-body">

<div id="gate">
  <div class="hf-eyebrow">Verifying access…</div>
</div>

<script type="module">
  import { auth, onAuthStateChanged } from '/js/config/firebase-config.js'
  import { featureAccessControl } from '/js/modules/access-control/services/feature-access-control.js'

  // Gate runs first — only after we confirm auth + feature access do we
  // swap the gate placeholder for a real <div id="app"> and dynamically
  // import the Ross bundle. Keeps unauthorised users off the Vue app
  // entirely so no API calls are fired until rights are confirmed.
  document.addEventListener('DOMContentLoaded', () => {
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = '/user-login.html?message=unauthorized'
        return
      }

      try {
        const token = await user.getIdTokenResult()
        if (!token.claims.admin) {
          const access = await featureAccessControl.checkFeatureAccess('rossBasic')
          if (!access.hasAccess) {
            const gate = document.getElementById('gate')
            gate.innerHTML = `
              <div class="alert alert--warn">
                <h5>ROSS requires a subscription with ROSS access.</h5>
                <p style="margin: 0;">Upgrade your plan to access the Restaurant Operations Support System.</p>
              </div>`
            return
          }
        }

        // Gate cleared — replace placeholder with the app mount point and
        // dynamic-import the Vue entry so the initial HTML doesn't ship a
        // bundle the visitor might never be allowed to run.
        const host = document.getElementById('gate')
        host.outerHTML = '<div id="app"></div>'
        await import('/js/modules/ross/v2/main-home.js')
      } catch (err) {
        const gate = document.getElementById('gate')
        gate.innerHTML = `
          <div class="alert alert--warn">
            <h5>Initialisation error</h5>
            <p style="margin: 0;">${(err && err.message) || 'Unknown error'}</p>
          </div>`
      }
    })
  })
</script>

</body>
</html>
