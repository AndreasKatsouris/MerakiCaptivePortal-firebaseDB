<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Sparks Hospitality</title>
    <link rel="stylesheet" href="/css/hifi-fonts.css">
    <link rel="stylesheet" href="/css/hifi-tokens.css">
    <link rel="stylesheet" href="/css/hifi-base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html, body { margin: 0; padding: 0; min-height: 100vh; }

        body {
            display: grid;
            grid-template-columns: 1fr;
            align-items: center;
            justify-items: center;
            padding: var(--hf-space-6) var(--hf-space-4);
            background: var(--hf-bg);
            background-image:
                radial-gradient(circle at 10% 10%, rgba(200, 154, 58, 0.10), transparent 520px),
                radial-gradient(circle at 95% 95%, rgba(90, 122, 74, 0.05), transparent 420px);
        }

        .auth-shell {
            width: 100%;
            max-width: 460px;
            position: relative;
        }

        .auth-eyebrow {
            text-align: center;
            margin-bottom: var(--hf-space-3);
        }

        .auth-card {
            background: var(--hf-paper);
            border: 1px solid var(--hf-line-2);
            border-radius: var(--hf-radius-md);
            overflow: hidden;
            box-shadow: var(--hf-shadow-2);
        }

        .auth-banner {
            position: relative;
            padding: var(--hf-space-7) var(--hf-space-6) var(--hf-space-6);
            text-align: center;
            background: var(--hf-ink);
            color: var(--hf-bg);
            overflow: hidden;
        }

        .auth-banner::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 0%, rgba(200, 154, 58, 0.18), transparent 50%),
                radial-gradient(circle at 80% 100%, rgba(180, 144, 59, 0.14), transparent 55%);
            pointer-events: none;
        }

        .auth-banner > * { position: relative; }

        .brand-mark {
            width: 56px;
            height: 56px;
            margin: 0 auto var(--hf-space-4);
            display: grid;
            place-items: center;
            border: 1px solid rgba(247, 244, 236, 0.25);
            border-radius: 50%;
            color: var(--hf-accent);
            font-size: 20px;
        }

        .banner-title {
            font-family: var(--hf-font-display);
            font-size: 36px;
            line-height: 1.05;
            letter-spacing: -0.01em;
            margin: 0 0 var(--hf-space-2);
            font-weight: 400;
        }

        .banner-subtitle {
            margin: 0;
            font-size: 13px;
            color: rgba(247, 244, 236, 0.7);
        }

        .auth-body {
            padding: var(--hf-space-6);
        }

        .field {
            margin-bottom: var(--hf-space-4);
        }

        .field-label {
            display: block;
            font-family: var(--hf-font-mono);
            font-size: 11px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--hf-muted);
            margin-bottom: var(--hf-space-2);
        }

        .field-input {
            width: 100%;
            padding: 12px 14px;
            background: var(--hf-bg);
            border: 1px solid var(--hf-line-2);
            border-radius: var(--hf-radius);
            font-family: var(--hf-font-body);
            font-size: 14px;
            color: var(--hf-ink);
            transition: border-color var(--hf-transition), background var(--hf-transition), box-shadow var(--hf-transition);
        }

        .field-input::placeholder { color: var(--hf-muted); opacity: 0.55; }

        .field-input:hover { border-color: var(--hf-ink-2); }

        .field-input:focus {
            outline: none;
            border-color: var(--hf-accent);
            background: var(--hf-paper);
            box-shadow: 0 0 0 3px rgba(200, 154, 58, 0.15);
        }

        .row-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: var(--hf-space-4) 0 var(--hf-space-5);
        }

        .form-check {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-check input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--hf-accent);
            cursor: pointer;
        }

        .form-check label {
            font-size: 13px;
            color: var(--hf-ink-2);
            cursor: pointer;
            user-select: none;
        }

        .forgot-password a {
            font-family: var(--hf-font-mono);
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--hf-muted);
            text-decoration: none;
            transition: color var(--hf-transition);
        }

        .forgot-password a:hover { color: var(--hf-accent); }

        #alertContainer .alert {
            padding: 12px 14px;
            border-radius: var(--hf-radius);
            font-size: 13px;
            margin-bottom: var(--hf-space-4);
        }

        #alertContainer .alert-danger {
            background: rgba(176, 85, 58, 0.08);
            border: 1px solid rgba(176, 85, 58, 0.3);
            color: var(--hf-crit);
        }

        #alertContainer .alert-success {
            background: rgba(92, 122, 74, 0.08);
            border: 1px solid rgba(92, 122, 74, 0.3);
            color: var(--hf-good);
        }

        .login-btn {
            width: 100%;
            padding: 13px 20px;
            background: var(--hf-ink);
            color: var(--hf-bg);
            border: 1px solid var(--hf-ink);
            border-radius: var(--hf-radius);
            font-family: var(--hf-font-body);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background var(--hf-transition), transform var(--hf-transition), box-shadow var(--hf-transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn:hover:not(:disabled) {
            background: var(--hf-ink-2);
            box-shadow: var(--hf-shadow-2);
        }

        .login-btn:active:not(:disabled) { transform: translateY(1px); }

        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .spinner-border {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(247, 244, 236, 0.3);
            border-top-color: var(--hf-bg);
            border-radius: 50%;
            animation: hf-spin 0.8s linear infinite;
        }

        @keyframes hf-spin { to { transform: rotate(360deg); } }

        .divider {
            display: flex;
            align-items: center;
            gap: var(--hf-space-3);
            margin: var(--hf-space-6) 0 var(--hf-space-4);
            font-family: var(--hf-font-mono);
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--hf-muted);
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-top: 1px solid var(--hf-line);
        }

        .signup-link {
            text-align: center;
        }

        .signup-link a {
            display: inline-block;
            padding: 11px 22px;
            background: transparent;
            color: var(--hf-ink);
            border: 1px solid var(--hf-line-2);
            border-radius: var(--hf-radius);
            font-family: var(--hf-font-body);
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            transition: all var(--hf-transition);
        }

        .signup-link a:hover {
            border-color: var(--hf-accent);
            color: var(--hf-accent);
        }

        .admin-login-link {
            text-align: center;
            margin-top: var(--hf-space-5);
            padding-top: var(--hf-space-4);
            border-top: 1px solid var(--hf-line);
        }

        .admin-login-link a {
            font-family: var(--hf-font-mono);
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--hf-muted);
            text-decoration: none;
            transition: color var(--hf-transition);
        }

        .admin-login-link a:hover { color: var(--hf-ink); }

        *:focus-visible {
            outline: 2px solid var(--hf-accent);
            outline-offset: 2px;
        }

        @media (max-width: 540px) {
            .auth-banner { padding: var(--hf-space-6) var(--hf-space-5); }
            .auth-body { padding: var(--hf-space-5); }
            .banner-title { font-size: 28px; }
            .row-between { flex-direction: column; gap: var(--hf-space-3); align-items: flex-start; }
        }
    </style>
</head>
<body class="hf-body">
    <div class="auth-shell">
        <div class="auth-eyebrow">
            <span class="hf-eyebrow">Sparks Hospitality</span>
        </div>

        <div class="auth-card">
            <div class="auth-banner">
                <div class="brand-mark">
                    <i class="fas fa-bolt"></i>
                </div>
                <h1 class="banner-title">Welcome back</h1>
                <p class="banner-subtitle">Sign in to your Sparks account</p>
            </div>

            <div class="auth-body">
                <div id="alertContainer"></div>

                <form id="loginForm">
                    <div class="field">
                        <label for="email" class="field-label">Email Address</label>
                        <input type="email" class="field-input" id="email" placeholder="you@restaurant.com" required>
                    </div>

                    <div class="field">
                        <label for="password" class="field-label">Password</label>
                        <input type="password" class="field-input" id="password" placeholder="••••••••" required>
                    </div>

                    <div class="row-between">
                        <div class="form-check">
                            <input type="checkbox" id="rememberMe">
                            <label for="rememberMe">Remember me</label>
                        </div>
                        <div class="forgot-password">
                            <a href="/forgot-password.html">Forgot password?</a>
                        </div>
                    </div>

                    <button type="submit" class="login-btn" id="loginBtn">
                        <span id="loginBtnText">Sign In</span>
                        <span id="loginBtnSpinner" class="spinner-border" style="display: none;"></span>
                    </button>
                </form>

                <div class="divider">New to Sparks</div>

                <div class="signup-link">
                    <a href="/signup.html">Create an account</a>
                </div>

                <div class="admin-login-link">
                    <a href="/admin-login.html">Admin Login <i class="fas fa-arrow-right ms-1"></i></a>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/js/user-login.js?v=202604240001"></script>
</body>
</html>
